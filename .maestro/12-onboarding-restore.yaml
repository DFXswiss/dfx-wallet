appId: ${APP_ID}
name: 12-onboarding-restore
tags:
  - onboarding
  - feature-restore
  - feature-pin
  - feature-legal
env:
  # Standard 12-word BIP39 test mnemonic. Override via:
  #   maestro test --env "TEST_MNEMONIC=word1 word2 ..." .maestro/12-onboarding-restore.yaml
  TEST_MNEMONIC: "test test test test test test test test test test test junk"
---
- launchApp:
    clearState: true
    clearKeychain: true

# Welcome -> Restore Wallet (toggle reveals options)
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-restore-toggle"
- tapOn:
    id: "welcome-restore-seed-button"

# Restore Wallet -> enter seed -> continue
- assertVisible:
    id: "restore-wallet-screen"
- tapOn:
    id: "restore-wallet-seed-input"
- inputText: ${TEST_MNEMONIC}
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "restore-wallet-continue-button"
    direction: DOWN
- tapOn:
    id: "restore-wallet-continue-button"

# Setup PIN (create step)
- assertVisible:
    id: "setup-pin-screen"
- repeat:
    times: 6
    commands:
      - tapOn:
          id: "pin-key-1"

# Setup PIN (confirm step)
- assertVisible:
    id: "setup-pin-confirm-screen"
- repeat:
    times: 6
    commands:
      - tapOn:
          id: "pin-key-1"

# Legal disclaimer
- assertVisible:
    id: "legal-disclaimer-screen"
- tapOn:
    id: "legal-accept-checkbox"
- scrollUntilVisible:
    element:
      id: "legal-continue-button"
    direction: DOWN
- tapOn:
    id: "legal-continue-button"

# Dashboard reached
- assertVisible:
    id: "dashboard-screen"
