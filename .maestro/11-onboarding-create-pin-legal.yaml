appId: ${APP_ID}
name: 11-onboarding-create-pin-legal
tags:
  - onboarding
  - feature-pin
  - feature-legal
---
# Full create-wallet onboarding including PIN setup + legal-disclaimer.
# Requires EXPO_PUBLIC_ENABLE_PIN=true and EXPO_PUBLIC_ENABLE_LEGAL=true;
# with either off, the corresponding step is replaced by a Disabled
# stub that routes around it and this flow fails on the missing
# `setup-pin-screen` / `legal-disclaimer-screen` assertion.
- launchApp:
    clearState: true
    clearKeychain: true

# Welcome -> Create Wallet
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-create-wallet-button"

# Create Wallet -> reveal seed -> continue
- assertVisible:
    id: "create-wallet-screen"
- tapOn:
    id: "create-wallet-reveal-button"
- assertVisible:
    id: "create-wallet-seed-container"
- tapOn:
    id: "create-wallet-continue-button"

# Setup PIN (create step) -> tap "1" six times
- assertVisible:
    id: "setup-pin-screen"
- repeat:
    times: 6
    commands:
      - tapOn:
          id: "pin-key-1"

# Setup PIN (confirm step) -> tap "1" six times
- assertVisible:
    id: "setup-pin-confirm-screen"
- repeat:
    times: 6
    commands:
      - tapOn:
          id: "pin-key-1"

# Legal disclaimer -> accept -> continue
- assertVisible:
    id: "legal-disclaimer-screen"
- tapOn:
    id: "legal-accept-checkbox"
- scrollUntilVisible:
    element:
      id: "legal-continue-button"
    direction: DOWN
- tapOn:
    id: "legal-continue-button"

# Dashboard reached
- assertVisible:
    id: "dashboard-screen"
- assertVisible:
    id: "dashboard-action-portfolio"
- assertVisible:
    id: "dashboard-action-pay"
- assertVisible:
    id: "dashboard-action-transactions"
- assertVisible:
    id: "dashboard-action-send"
- assertVisible:
    id: "dashboard-action-receive"
