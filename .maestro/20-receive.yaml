appId: ${APP_ID}
name: 20-receive
tags:
  - smoke
  - dashboard
  - mvp
---
# Walks an MVP user from a fresh install through the Receive flow:
# Dashboard -> Receive (asset list) -> tap BTC -> QR step (container
# rendered even before WDK has produced an address) -> back to assets.
# With EXPO_PUBLIC_ENABLE_PIN + EXPO_PUBLIC_ENABLE_LEGAL off,
# SetupPinDisabled bridges Create -> Dashboard without a PIN or legal
# step (see 10-onboarding-create.yaml for the same bridge).
- launchApp:
    clearState: true
    clearKeychain: true
# Belt-and-suspenders for the Android emulator: in case the
# Pixel-Launcher disable in the workflow does not take effect (e.g.
# on a future AVD without launcher3 as fallback), dismiss any ANR
# dialog that still overlays the app. 'optional: true' makes this a
# no-op on iOS and when the dialog does not appear.
- tapOn:
    text: "Wait"
    optional: true

- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-create-wallet-button"

- assertVisible:
    id: "create-wallet-screen"
- tapOn:
    id: "create-wallet-reveal-button"
- assertVisible:
    id: "create-wallet-seed-container"
- tapOn:
    id: "create-wallet-continue-button"

# Dashboard -> Receive (asset step)
- assertVisible:
    id: "dashboard-screen"
- tapOn:
    id: "dashboard-action-receive"

- assertVisible:
    id: "receive-screen"
- assertVisible:
    id: "receive-asset-list"
- assertVisible:
    id: "receive-asset-btc"
- assertVisible:
    id: "receive-asset-chf"

# Asset -> QR step
- tapOn:
    id: "receive-asset-btc"
- assertVisible:
    id: "receive-qr"
- assertVisible:
    id: "receive-address"
- assertVisible:
    id: "receive-copy-button"

# Back to asset step via the selected-asset pill
- tapOn:
    id: "receive-selected-asset-pill"
- assertVisible:
    id: "receive-asset-list"
