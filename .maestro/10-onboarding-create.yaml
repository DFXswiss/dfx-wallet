appId: ${APP_ID}
name: 10-onboarding-create
tags:
  - onboarding
  - mvp
---
- launchApp:
    clearState: true
    clearKeychain: true
# Belt-and-suspenders for the Android emulator: in case the
# Pixel-Launcher disable in the workflow does not take effect (e.g.
# on a future AVD without launcher3 as fallback), dismiss any ANR
# dialog that still overlays the app. 'optional: true' makes this a
# no-op on iOS and when the dialog does not appear.
- tapOn:
    text: "Wait"
    optional: true

# Welcome -> Create Wallet
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-create-wallet-button"

# Create Wallet -> reveal seed -> continue
- assertVisible:
    id: "create-wallet-screen"
- tapOn:
    id: "create-wallet-reveal-button"
- assertVisible:
    id: "create-wallet-seed-container"
- tapOn:
    id: "create-wallet-continue-button"

# With EXPO_PUBLIC_ENABLE_PIN + EXPO_PUBLIC_ENABLE_LEGAL off (the MVP
# build), SetupPinDisabled flips `isOnboarded` + `isAuthenticated` and
# routes straight to the dashboard. The full PIN + legal-disclaimer
# variant of this flow lives in 11-onboarding-create-pin-legal.yaml
# and runs once those features ship.
- assertVisible:
    id: "dashboard-screen"
- assertVisible:
    id: "dashboard-action-receive"
- assertVisible:
    id: "dashboard-action-send"
