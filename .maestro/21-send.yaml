appId: ${APP_ID}
name: 21-send
tags:
  - smoke
  - dashboard
  - mvp
---
# Walks an MVP user from a fresh install through the Send flow:
# Dashboard -> Send (asset list) -> tap BTC -> input step -> fill in a
# dummy recipient + amount -> tap Continue -> Confirm step -> Cancel
# back to input -> back to asset list.
#
# We deliberately do NOT tap the Confirm button on the confirm step:
# that calls `handleSend()` which broadcasts a transaction. The Cancel
# path exercises the round-trip without touching the WDK signer.
- launchApp:
    clearState: true
    clearKeychain: true

- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-create-wallet-button"

- assertVisible:
    id: "create-wallet-screen"
- tapOn:
    id: "create-wallet-reveal-button"
- assertVisible:
    id: "create-wallet-seed-container"
- tapOn:
    id: "create-wallet-continue-button"

# Dashboard -> Send (asset step)
- assertVisible:
    id: "dashboard-screen"
- tapOn:
    id: "dashboard-action-send"

- assertVisible:
    id: "send-screen"
- assertVisible:
    id: "send-asset-list"
- assertVisible:
    id: "send-asset-btc"
- assertVisible:
    id: "send-asset-chf"

# Asset -> Input step
- tapOn:
    id: "send-asset-btc"
- assertVisible:
    id: "send-input-step"
- assertVisible:
    id: "send-recipient-input"
- assertVisible:
    id: "send-amount-input"
- assertVisible:
    id: "send-continue-button"

# Fill in a long dummy recipient (>=26 chars to clear isValidAddress)
# and a non-zero amount, then continue to the confirm screen.
- tapOn:
    id: "send-recipient-input"
- inputText: "bc1qe2etestrecipientaddress0000"
- tapOn: "return"
- tapOn:
    id: "send-amount-input"
- inputText: "0.0001"
- tapOn: "return"
- tapOn:
    id: "send-continue-button"

# Confirm step renders — never tap send-confirm-button (it broadcasts).
- assertVisible:
    id: "send-confirm-step"
- assertVisible:
    id: "send-confirm-button"
- assertVisible:
    id: "send-cancel-button"

# Cancel returns to the input step
- tapOn:
    id: "send-cancel-button"
- assertVisible:
    id: "send-input-step"

# Back to asset step via the selected-asset pill
- tapOn:
    id: "send-selected-asset-pill"
- assertVisible:
    id: "send-asset-list"
