appId: ${APP_ID}
name: 12-pin-unlock
tags:
  - pin
  - onboarding
---
# Onboard a fresh wallet so secureStorage holds a PIN hash and the
# `isOnboarded` flag. We duplicate the onboarding steps inline rather
# than extracting a sub-flow — when more post-onboarding flows land
# (send, receive, settings) we'll factor this into `.maestro/_lib/`.
- launchApp:
    clearState: true
    clearKeychain: true

- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-create-wallet-button"

- assertVisible:
    id: "create-wallet-screen"
- tapOn:
    id: "create-wallet-reveal-button"
- assertVisible:
    id: "create-wallet-seed-container"
- tapOn:
    id: "create-wallet-continue-button"

- assertVisible:
    id: "setup-pin-screen"
- repeat:
    times: 6
    commands:
      - tapOn:
          id: "pin-key-1"

- assertVisible:
    id: "setup-pin-confirm-screen"
- repeat:
    times: 6
    commands:
      - tapOn:
          id: "pin-key-1"

- assertVisible:
    id: "legal-disclaimer-screen"
- tapOn:
    id: "legal-accept-checkbox"
- tapOn:
    id: "legal-continue-button"

- assertVisible:
    id: "dashboard-screen"

# Cold-restart the app: secureStorage persists (`isOnboarded=true`,
# pinHash present), but `isAuthenticated` is in-memory only and resets
# to false, so app/index.tsx redirects to /(pin)/verify.
- stopApp
- launchApp:
    clearState: false
    clearKeychain: false

# Wrong PIN first — exercises the error path
- assertVisible:
    id: "verify-pin-screen"
- repeat:
    times: 6
    commands:
      - tapOn:
          id: "pin-key-2"
- assertVisible: "Incorrect PIN"

# Correct PIN unlocks
- repeat:
    times: 6
    commands:
      - tapOn:
          id: "pin-key-1"
- assertVisible:
    id: "dashboard-screen"
