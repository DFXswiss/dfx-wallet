name: Beta Release (iOS only)

on:
  push:
    tags: ['ios/v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: beta-release-ios
  cancel-in-progress: false

jobs:
  build-ios:
    name: Build iOS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS
        run: eas build --platform ios --profile production --non-interactive --no-wait
