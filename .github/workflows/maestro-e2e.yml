name: Maestro E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'

# Cancel superseded runs on the same PR / branch.
concurrency:
  group: maestro-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 22

jobs:
  e2e:
    name: EAS Build + Maestro Cloud
    # Skip drafts so WIP pushes don't burn EAS / Maestro Cloud minutes.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install JS dependencies
        run: |
          npm ci --legacy-peer-deps --ignore-scripts
          npx patch-package

      - name: Trigger EAS builds (iOS + Android in parallel)
        id: builds
        run: |
          set -euo pipefail
          eas build --profile e2e --platform all --non-interactive --json --no-wait > builds.json
          IOS_ID=$(jq -r '.[] | select(.platform == "IOS") | .id' builds.json)
          ANDROID_ID=$(jq -r '.[] | select(.platform == "ANDROID") | .id' builds.json)
          echo "ios_id=$IOS_ID" >> "$GITHUB_OUTPUT"
          echo "android_id=$ANDROID_ID" >> "$GITHUB_OUTPUT"
          echo "iOS build:     https://expo.dev/accounts/${{ vars.EXPO_OWNER }}/projects/dfx-wallet/builds/$IOS_ID"
          echo "Android build: https://expo.dev/accounts/${{ vars.EXPO_OWNER }}/projects/dfx-wallet/builds/$ANDROID_ID"

      - name: Wait for builds to finish
        run: |
          set -euo pipefail
          for id in ${{ steps.builds.outputs.ios_id }} ${{ steps.builds.outputs.android_id }}; do
            until status=$(eas build:view "$id" --json | jq -r .status) && [[ "$status" == "FINISHED" || "$status" == "ERRORED" || "$status" == "CANCELED" ]]; do
              echo "[$id] $status, retry in 30s"
              sleep 30
            done
            if [[ "$status" != "FINISHED" ]]; then
              echo "Build $id ended with status $status — failing."
              exit 1
            fi
          done

      - name: Download build artifacts
        run: |
          set -euo pipefail
          IOS_URL=$(eas build:view ${{ steps.builds.outputs.ios_id }} --json | jq -r .artifacts.applicationArchiveUrl)
          ANDROID_URL=$(eas build:view ${{ steps.builds.outputs.android_id }} --json | jq -r .artifacts.applicationArchiveUrl)
          mkdir -p artifacts
          curl -fsSL "$IOS_URL" -o artifacts/ios-app.tar.gz
          curl -fsSL "$ANDROID_URL" -o artifacts/android-app.apk
          ls -la artifacts/

      - name: Install Maestro CLI
        run: |
          curl -fsSL https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run flows on Maestro Cloud (iOS + Android in parallel)
        env:
          API_KEY: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          PROJECT_ID: ${{ vars.MAESTRO_CLOUD_PROJECT_ID }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          PR: ${{ github.event.pull_request.number || 'manual' }}
        run: |
          maestro cloud \
            --api-key "$API_KEY" --project-id "$PROJECT_ID" \
            --app-file artifacts/ios-app.tar.gz --flows .maestro/ \
            --branch "$BRANCH" --commit-sha "$COMMIT_SHA" \
            --name "iOS PR-$PR" > ios-cloud.txt 2>&1 &
          IOS_PID=$!
          maestro cloud \
            --api-key "$API_KEY" --project-id "$PROJECT_ID" \
            --app-file artifacts/android-app.apk --flows .maestro/ \
            --branch "$BRANCH" --commit-sha "$COMMIT_SHA" \
            --name "Android PR-$PR" > android-cloud.txt 2>&1 &
          ANDROID_PID=$!
          ios_status=0
          android_status=0
          wait $IOS_PID || ios_status=$?
          wait $ANDROID_PID || android_status=$?
          echo "===== iOS ====="
          cat ios-cloud.txt
          echo "===== Android ====="
          cat android-cloud.txt
          if [ $ios_status -ne 0 ] || [ $android_status -ne 0 ]; then
            echo "Maestro Cloud failed — iOS=$ios_status Android=$android_status"
            exit 1
          fi

      - name: Upload build & Maestro logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maestro-e2e-logs
          path: |
            builds.json
            ios-cloud.txt
            android-cloud.txt
          if-no-files-found: ignore
