name: Maestro E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'

# Cancel superseded runs on the same PR / branch.
concurrency:
  group: maestro-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 22
  # Public testnet URLs live in the committed `.env.testnet` and are copied
  # into `.env` during the build step. Only the indexer API key is secret.
  EXPO_PUBLIC_WDK_INDEXER_API_KEY: ${{ secrets.E2E_WDK_INDEXER_API_KEY }}

jobs:
  ios:
    name: iOS Simulator
    # Skip drafts so WIP pushes don't burn ~30 min of macOS minutes per push.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft != true
    runs-on: macos-latest
    # The iOS build (xcodebuild + pod install + simctl boot + framework
    # cache) alone takes ~50min on macos-latest. With the MVP Maestro
    # suite (~5min for 7 flows) the old 60min ceiling was hitting the
    # wall on roughly every other PR.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install JS dependencies
        run: |
          npm ci --legacy-peer-deps --ignore-scripts
          npx patch-package
          npm run postinstall

      - name: Provision testnet env
        run: cp .env.testnet .env

      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Boot iOS Simulator
        run: |
          # Lines look like `    iPhone 16 (UUID) (Shutdown)`; split on parens
          # and take the UUID column (field 2). $NF used to work but newer
          # Xcode appends the device state, so $NF was returning "(Shutdown)".
          DEVICE_ID=$(xcrun simctl list devices available | awk -F'[()]' '/iPhone 16 \(/{print $2; exit}')
          if [ -z "$DEVICE_ID" ]; then
            DEVICE_ID=$(xcrun simctl create "iPhone 16 E2E" "iPhone 16")
          fi
          xcrun simctl boot "$DEVICE_ID" || true
          echo "SIM_DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"

      - name: Build & install app on simulator
        run: npx expo run:ios --configuration Release --device "$SIM_DEVICE_ID" --no-bundler

      - name: Run Maestro tests
        # MVP build ships every EXPO_PUBLIC_ENABLE_* flag off — restrict
        # to the `mvp` tag so the gated-feature flows (restore wallet,
        # PIN unlock, full create-with-pin-legal) don't run against
        # disabled stubs. Drop `--include-tags` once the corresponding
        # features land.
        run: maestro --platform ios test --include-tags mvp --env APP_ID=wallet.dfx.swiss .maestro/

      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maestro-ios-artifacts
          path: ~/.maestro/tests/**/*
          if-no-files-found: ignore

  android:
    name: Android Emulator
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    # The release Gradle build takes ~40min on the smaller Linux runner,
    # plus the emulator-runner's cold-boot (with its own internal retry),
    # the launcher swap + settle, and the MVP Maestro suite (~5min).
    # 90min leaves a comfortable buffer.
    timeout-minutes: 90
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      # GitHub's macos-latest runners disable Hypervisor.framework, so any
      # Android AVD (x86_64 via Rosetta or arm64-v8a via HVF) fails to boot.
      # Linux runners ship with /dev/kvm; enabling user-level access lets the
      # emulator drop into native KVM acceleration and boot reliably.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install JS dependencies
        run: |
          npm ci --legacy-peer-deps --ignore-scripts
          npx patch-package
          npm run postinstall

      - name: Provision testnet env
        run: cp .env.testnet .env

      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Run E2E in emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            cd android && ./gradlew :app:assembleRelease -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m" && cd ..
            adb install -r android/app/build/outputs/apk/release/app-release.apk
            # The Pixel Launcher (com.google.android.apps.nexuslauncher)
            # on the emulator AVD repeatedly spawns ANR dialogs
            # ("Pixel Launcher isn't responding" with Wait/Close-app)
            # that overlay the foregrounded app on every navigation
            # transition. Disabling it for user 0 forces the system to
            # its AOSP fallback (com.android.launcher3), which doesn't
            # ANR and is invisible to flows that assert on app testIDs.
            adb shell pm disable-user --user 0 com.google.android.apps.nexuslauncher || true
            adb shell am kill-all
            sleep 10
            # MVP-only — see the iOS step for why; drop --include-tags
            # once the gated features ship.
            maestro --platform android test --include-tags mvp --env APP_ID=swiss.dfx.wallet .maestro/

      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maestro-android-artifacts
          path: ~/.maestro/tests/**/*
          if-no-files-found: ignore
