name: Beta Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: beta-release
  cancel-in-progress: false

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        run: |
          BUILD_JSON=$(eas build --platform android --profile production --non-interactive --wait --json 2>/dev/null)
          echo "$BUILD_JSON" > /tmp/android-build.json
          APK_URL=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // empty')
          echo "APK_URL=$APK_URL" >> $GITHUB_ENV

      - name: Download APK
        if: env.APK_URL != ''
        run: |
          TAG="${GITHUB_REF_NAME:-dev}"
          VERSION="${TAG#v}"
          curl -fsSL "$APK_URL" -o "dfx-wallet-${VERSION}.apk"

      - name: Upload APK artifact
        if: env.APK_URL != ''
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: dfx-wallet-*.apk

  build-ios:
    name: Build iOS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS
        run: |
          BUILD_JSON=$(eas build --platform ios --profile production --non-interactive --wait --json 2>/dev/null)
          echo "$BUILD_JSON" > /tmp/ios-build.json
          IPA_URL=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // empty')
          echo "IPA_URL=$IPA_URL" >> $GITHUB_ENV

      - name: Download IPA
        if: env.IPA_URL != ''
        run: |
          TAG="${GITHUB_REF_NAME:-dev}"
          VERSION="${TAG#v}"
          curl -fsSL "$IPA_URL" -o "dfx-wallet-${VERSION}.ipa"

      - name: Upload IPA artifact
        if: env.IPA_URL != ''
        uses: actions/upload-artifact@v7
        with:
          name: ios-ipa
          path: dfx-wallet-*.ipa

  github-release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6.2.1
        with:
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}",
              "categories": [
                {
                  "title": "## 🚀 Features",
                  "labels": ["feat", "feature"]
                },
                {
                  "title": "## 🐛 Fixes",
                  "labels": ["fix", "bug"]
                },
                {
                  "title": "## 📦 Refactor",
                  "labels": ["refactor"]
                },
                {
                  "title": "## 📦 Others",
                  "labels": ["chore"]
                },
                {
                  "title": "## 🌀 Not labelled",
                  "labels": []
                }
              ],
              "label_extractor": [
                {
                  "method": "match",
                  "pattern": "^([\\w\\-]+)",
                  "target": "$1",
                  "on_property": "title"
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: .

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            dfx-wallet-*.apk
            dfx-wallet-*.ipa
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
