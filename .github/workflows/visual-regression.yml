name: Visual Regression

on:
  workflow_dispatch:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'

concurrency:
  group: visual-regression-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 22
  EXPO_PUBLIC_WDK_INDEXER_API_KEY: ${{ secrets.E2E_WDK_INDEXER_API_KEY }}

jobs:
  ios:
    name: iOS Visual Regression
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft != true
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install applesimutils
        run: brew tap wix/brew && brew install applesimutils

      - name: Install JS dependencies
        run: |
          npm ci --legacy-peer-deps --ignore-scripts
          npx patch-package
          npm run postinstall

      - name: Build Detox framework cache
        run: npx detox build-framework-cache

      - name: Provision testnet env
        run: cp .env.testnet .env

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Build app for simulator (Release)
        run: npm run e2e:build:ios

      - name: Run visual regression tests
        run: npm run e2e:test:ios

      - name: Upload diff images on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-regression-diffs
          path: e2e/__diffs__/
          if-no-files-found: ignore

      - name: Upload Detox artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: detox-artifacts
          path: artifacts/
          if-no-files-found: ignore
