name: bitbox-audit

# Runs the BitBox firmware-quirk audit (https://github.com/joshuakrueger-dfx/bitbox-testkit)
# against every PR that touches BitBox-relevant code. The audit combines
# static source detection with dynamic test coverage — Jest runs in --json
# mode and the bitbox-audit CLI cross-references quirk IDs mentioned in
# test names. Always-comment so the PR shows which quirks are covered,
# untested, or actively failing.

on:
  pull_request:
    paths:
      - 'src/features/hardware-wallet/**'
      - 'modules/bitbox-hid/**'
      - 'test/services/bitbox*.test.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/bitbox-audit.yml'

permissions:
  contents: read
  pull-requests: write   # to post the findings comment

concurrency:
  group: bitbox-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: scan for known firmware quirks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # No npm cache here — the consumer's lock file may have drift
          # we don't control; falling back to a permissive install rather
          # than failing the whole audit job on lock churn.

      - name: Install Node dependencies (permissive)
        # Tolerate package-lock drift: production lockfile may temporarily
        # diverge from package.json during feature work. We need Jest +
        # transforms running; a non-strict install does the job.
        # continue-on-error so a hostile dependency state falls back to
        # static-only audit rather than blocking the PR comment entirely.
        id: deps
        continue-on-error: true
        run: |
          npm install --no-audit --no-fund --legacy-peer-deps --ignore-scripts \
            || echo "::warning::npm install failed; static-only audit will follow"

      - name: Install bitbox-audit CLIs
        env:
          TESTKIT_REF: 'main'
        run: |
          go install "github.com/joshuakrueger-dfx/bitbox-testkit/go/cmd/bitbox-audit@${TESTKIT_REF}"
          go install "github.com/joshuakrueger-dfx/bitbox-testkit/go/cmd/bitbox-audit-explain@${TESTKIT_REF}"

      - name: Run BitBox-specific Jest tests
        # Best-effort. If deps install failed or Jest can't boot, we
        # continue with static-only audit. The audit-runner reads the
        # results file only if it exists.
        if: steps.deps.outcome == 'success'
        continue-on-error: true
        run: |
          npx jest --selectProjects unit \
            --json \
            --outputFile=jest-bitbox-results.json \
            --testPathPattern='test/services/bitbox.*\.test\.ts' \
            || echo "::warning::Jest run failed; audit will use static-only coverage"

      - name: Run audit
        id: audit
        run: |
          set -o pipefail
          rc=0
          # --test-results is optional; pass only if Jest produced one.
          tr_args=()
          if [ -f jest-bitbox-results.json ]; then
            tr_args=(--test-results jest-bitbox-results.json)
          fi
          bitbox-audit \
            --repo . \
            "${tr_args[@]}" \
            --format json \
            --output findings.json \
            || rc=$?
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then
            echo "::error::bitbox-audit failed with exit code $rc"
            exit "$rc"
          fi
          jq '.summary, .coverage' findings.json
          echo "had_findings=$([ "$rc" -eq 2 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Render Markdown report
        run: |
          tr_args=()
          if [ -f jest-bitbox-results.json ]; then
            tr_args=(--test-results jest-bitbox-results.json)
          fi
          bitbox-audit \
            --repo . \
            "${tr_args[@]}" \
            --format markdown \
            --output report.md \
            || true

      - name: Comment on PR
        # Always post the coverage table — the user wants to see the
        # bucket breakdown even on clean PRs so untested quirks don't
        # silently accumulate.
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: bitbox-audit
          path: report.md

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bitbox-audit
          path: |
            findings.json
            jest-bitbox-results.json
            report.md
          if-no-files-found: ignore
          retention-days: 14
