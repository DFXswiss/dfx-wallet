name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      # @tetherto/pear-wrk-wdk's git-dep prepare runs `npx bare-pack --target ...`
      # without pinning a version. bare-pack@2 removed `--target`, so npm
      # aborts with `Bail: UNKNOWN_FLAG: target` before our project's
      # `preinstall` hook even runs (npm prepares git-deps first). Pin v1
      # globally here so npx finds it on PATH.
      - run: npm install -g bare-pack@^1
      # Scripts must run so the @tetherto/wdk-react-native-core git-dep's
      # `prepare` builds `dist/` (required by typecheck).
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      # See the note in the typecheck job: bare-pack@1 must be on PATH
      # before `npm ci` so the @tetherto/pear-wrk-wdk git-dep prepare
      # doesn't fall back to bare-pack@2 from the registry.
      - run: npm install -g bare-pack@^1
      # Scripts must run so wdk-react-native-core's dist/ exists for
      # ESLint's import/no-unresolved resolver.
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps --ignore-scripts
      - run: npm run format

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps --ignore-scripts
      - run: npx patch-package
      - run: npm test

  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: npm audit (high+)
        run: npm audit --audit-level=high
